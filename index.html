<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Update Pipeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e2e2e6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      max-width: 640px;
      text-align: center;
    }
    h1 { font-size: 28px; margin-bottom: 12px; font-weight: 700; }
    p { color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      color: #a8c7fa;
      text-decoration: none;
      padding: 12px 16px;
      border: 1px solid #2d3139;
      border-radius: 8px;
      transition: background 0.2s;
    }
    a:hover { background: #1a1d23; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Extension Update Pipeline</h1>
    <p>This site hosts signed browser extension updates. There is nothing to install from this page.</p>
    <div class="links">
      <a href="update.xml">Update Manifest (update.xml)</a>
      <a href="extension.crx">Signed Extension Package (extension.crx)</a>
    </div>
  </div>
</body>
</html>
